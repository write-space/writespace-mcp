name: Publish to MCP Registry

# Publishes server.json to the official MCP registry on every version tag.
# To release an update: bump the version (e.g. v1.1.0), then:
#   git tag v1.1.0 && git push origin v1.1.0
# The tag's version is written into server.json before publishing, so the
# tag is the single source of truth — no need to also edit server.json by hand.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # OIDC auth publishes to io.github.write-space/* as the repo itself —
    # no PAT secret and no public org membership required.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Set version in server.json from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
